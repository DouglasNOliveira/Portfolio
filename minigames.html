<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Games | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <header>
        <div class="hero">
            <h1>Mini Games</h1>
            <h2>Escolha entre Snake, Pong e Arkanoid para explorar uma pausa interativa no portfolio</h2>
        </div>
    </header>

    <main class="container">
        <nav class="tabs" aria-label="Navegacao principal">
            <a class="tab-link" href="sobre-mim.html">Sobre Mim</a>
            <a class="tab-link" href="formacao-academica.html">Formacao Academica</a>
            <a class="tab-link" href="portfolio.html">Portfolio</a>
            <a class="tab-link" href="contato.html">Contato</a>
            <div class="tab-dropdown">
                <a class="tab-link active" href="minigames.html">Mini Games</a>
                <div class="dropdown-menu">
                    <a class="dropdown-link" href="minigames.html">Snake</a>
                    <a class="dropdown-link" href="minigames.html?game=pong">Pong</a>
                    <a class="dropdown-link" href="minigames.html?game=arkanoid">Arkanoid</a>
                </div>
            </div>
        </nav>

        <section class="grid cols-2 snake-layout">
            <article class="card snake-stage">
                <div class="game-stage-header">
                    <div class="game-stage-spacer" aria-hidden="true"></div>
                    <h3 id="game-title" class="game-stage-title">Snake</h3>
                    <div class="game-stage-meta">
                        <div id="game-lives" class="game-lives" aria-label="Vidas do jogo" hidden></div>
                        <div class="game-stage-scoreboard" aria-label="Pontuacao do jogo">
                        <span class="game-stage-chip">PTS: <strong id="score">0</strong></span>
                        <span class="game-stage-chip">MAX: <strong id="high-score">0</strong></span>
                        </div>
                    </div>
                </div>
                <div class="snake-board-shell">
                    <canvas id="game-board" class="snake-board" width="640" height="360" aria-label="Area do jogo"></canvas>
                </div>
            </article>

            <aside class="card snake-panel">
                <div class="control-section">
                    <div id="game-pad" class="game-pad" aria-label="Controle direcional">
                        <button class="btn control-btn up" data-pad="up" type="button" aria-label="Mover para cima">
                            <span aria-hidden="true">&uarr;</span>
                        </button>
                        <button class="btn control-btn left" data-pad="left" type="button" aria-label="Mover para a esquerda">
                            <span aria-hidden="true">&larr;</span>
                        </button>
                        <button class="btn control-btn down" data-pad="down" type="button" aria-label="Mover para baixo">
                            <span aria-hidden="true">&darr;</span>
                        </button>
                        <button class="btn control-btn right" data-pad="right" type="button" aria-label="Mover para a direita">
                            <span aria-hidden="true">&rarr;</span>
                        </button>
                    </div>
                </div>

                <div class="snake-actions snake-actions-panel">
                    <div class="game-inline-tip game-inline-tip-panel">Use as setas para mover</div>
                    <div id="game-status" class="notice">Pronto para jogar.</div>
                </div>
            </aside>
        </section>
    </main>

    <footer class="footer">
        2026 - Portfolio de Douglas Nascimento de Oliveira
    </footer>

    <script src="assets/js/games/snake.js"></script>
    <script src="assets/js/games/pong.js"></script>
    <script src="assets/js/games/arkanoid.js"></script>
    <script src="assets/js/minigames-app.js"></script>
</body>
</html>
